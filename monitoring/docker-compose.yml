# ── Monitoring Stack ──────────────────────────────────────────────────────────
# Chạy độc lập sau khi mp-core đã khởi động:
#   docker compose -f monitoring/docker-compose.yml -p mp-monitoring up -d
#
# Services:
#   prometheus    — Thu thập metrics từ cAdvisor + kafka-exporter (port 9090)
#   cadvisor      — CPU/RAM/Disk của mọi container (port 8081)
#   kafka-exporter— Consumer lag, broker metrics từ Kafka (port 9308)
# ──────────────────────────────────────────────────────────────────────────────

services:

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - ../monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
    ports:
      - "127.0.0.1:9090:9090"

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    restart: unless-stopped
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    devices:
      - /dev/kmsg
    ports:
      - "127.0.0.1:8082:8080"

  kafka-exporter:
    image: danielqsj/kafka-exporter:latest
    container_name: kafka-exporter
    restart: unless-stopped
    command:
      - --kafka.server=kafka:29092
      - --web.listen-address=:9308
    ports:
      - "127.0.0.1:9308:9308"

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  prometheus_data:

# ── Network — bám theo cụm mp-core ───────────────────────────────────────────
networks:
  default:
    name: mp-core_default
    external: true
