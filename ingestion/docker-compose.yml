# ── Ingestion Services ─────────────────────────────────────────────────────────
# Run alongside the main stack:
#   docker compose -f docker-compose.yml -f ingestion/docker-compose.yml up -d
#
# Each producer/consumer is an isolated service with its own restart policy.
# A crash in one container does NOT affect others.
#
# Container naming: p-<type> = producer, c-<type> = consumer
#   p-trade, p-quote, p-index, p-ep, p-fi
#   c-trade, c-quote, c-index, c-ep, c-fi
# ──────────────────────────────────────────────────────────────────────────────

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-ingestion-common: &ingestion-common
  image: marketpulse-ingestion:latest
  build:
    context: . # Points to project root
    dockerfile: ingestion/Dockerfile
  env_file:
    - .env
  restart: unless-stopped
  logging: *default-logging

# ── Shared environment for all services ───────────────────────────────────────
# These OVERRIDE the .env defaults for Docker networking
# (localhost → actual service hostnames on the shared Docker network)
x-ingestion-env: &ingestion-env
  PYTHONUNBUFFERED: "1" # Flush print() immediately to Docker logs
  kafka_bootstrap_servers: kafka:29092
  schema_registry_url: http://schema-registry:8081
  postgres_host: timescaledb
  postgres_port: "5432"
  minio_endpoint: minio:9000
  # Symbol resolver defaults (override per-service as needed)
  SYMBOL_FILTER_MODE: db
  SYMBOL_FILTER_STATUS: NO_HALT
  SYMBOL_FILTER_SANCTION: NRM

# ═════════════════════════════════════════════════════════════════════════════
# PRODUCERS  (WebSocket DNSE → Kafka)
# ═════════════════════════════════════════════════════════════════════════════

services:

  p-trade:
    <<: *ingestion-common
    container_name: p-trade
    command: python ingestion/producers/dnse_trade_producer.py
    environment:
      <<: *ingestion-env
      SYMBOL_FILTER_GROUPS: FU # Futures/derivatives

  p-quote:
    <<: *ingestion-common
    container_name: p-quote
    command: python ingestion/producers/dnse_quote_producer.py
    environment:
      <<: *ingestion-env
      SYMBOL_FILTER_GROUPS: FU

  p-index:
    <<: *ingestion-common
    container_name: p-index
    command: python ingestion/producers/dnse_market_index_producer.py
    environment:
      <<: *ingestion-env
      SYMBOL_FILTER_MODE: static
      WATCH_SYMBOLS: VNINDEX,VN30,HNX30,UPCOM

  p-ep:
    <<: *ingestion-common
    container_name: p-ep
    command: python ingestion/producers/dnse_expected_price_producer.py
    environment:
      <<: *ingestion-env
      SYMBOL_FILTER_GROUPS: ""

  p-fi:
    <<: *ingestion-common
    container_name: p-fi
    command: python ingestion/producers/dnse_foreign_investor_producer.py
    environment:
      <<: *ingestion-env
      SYMBOL_FILTER_GROUPS: ""

  # ═════════════════════════════════════════════════════════════════════════════
  # CONSUMERS  (Kafka → TimescaleDB)
  # ═════════════════════════════════════════════════════════════════════════════

  c-trade:
    <<: *ingestion-common
    container_name: c-trade
    command: python ingestion/consumers/trade_consumer.py
    environment:
      <<: *ingestion-env

  c-quote:
    <<: *ingestion-common
    container_name: c-quote
    command: python ingestion/consumers/quote_consumer.py
    environment:
      <<: *ingestion-env

  c-index:
    <<: *ingestion-common
    container_name: c-index
    command: python ingestion/consumers/market_index_consumer.py
    environment:
      <<: *ingestion-env

  c-ep:
    <<: *ingestion-common
    container_name: c-ep
    command: python ingestion/consumers/expected_price_consumer.py
    environment:
      <<: *ingestion-env

  c-fi:
    <<: *ingestion-common
    container_name: c-fi
    command: python ingestion/consumers/foreign_investor_consumer.py
    environment:
      <<: *ingestion-env

  # ═════════════════════════════════════════════════════════════════════════════
  # ARCHIVERS  (Kafka → Delta Lake on MinIO)
  # ═════════════════════════════════════════════════════════════════════════════

  a-trade:
    <<: *ingestion-common
    container_name: a-trade
    command: python ingestion/archivers/trade_raw_archiver.py
    environment:
      <<: *ingestion-env

  a-quote:
    <<: *ingestion-common
    container_name: a-quote
    command: python ingestion/archivers/quote_raw_archiver.py
    environment:
      <<: *ingestion-env

  # ═════════════════════════════════════════════════════════════════════════════
  # ALERT MONITOR  (Telegram notifications)
  # ═════════════════════════════════════════════════════════════════════════════

  alert-monitor:
    <<: *ingestion-common
    container_name: alert-monitor
    # Use -m so Python resolves ingestion package from PYTHONPATH=/app correctly
    command: python -m ingestion.monitor.alert_monitor
    # TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID, postgres_* are inherited from
    # env_file: ../.env via *ingestion-common — no need to repeat here
    environment:
      <<: *ingestion-env
      GRAFANA_URL: ${GRAFANA_URL:-http://localhost:3000}
      # Docker Desktop TCP endpoint — enable in Docker Desktop:
      # Settings -> General -> Expose daemon on tcp://localhost:2375 (no TLS)
      DOCKER_HOST: tcp://host.docker.internal:2375
      POLL_INTERVAL_SECONDS: "60"
      RECOVERY_COOLDOWN_MINUTES: "5"
      TRADE_GAP_MINUTES: "3"
      QUOTE_GAP_MINUTES: "5"
    volumes:
      - monitor_state:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      # Check process is active by verifying the state file exists
      test: ["CMD-SHELL", "python -c \"import os; import sys; sys.exit(0 if os.path.exists('/data/monitor_state.json') else 1)\""]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 30s

# ═════════════════════════════════════════════════════════════════════════════
# Volumes
# ═════════════════════════════════════════════════════════════════════════════

volumes:
  monitor_state:

# ═════════════════════════════════════════════════════════════════════════════
# Network — reuse the shared network from root docker-compose.yml
# ═════════════════════════════════════════════════════════════════════════════

networks:
  default:
    name: mp-core_default
    external: true
